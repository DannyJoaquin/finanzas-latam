name: zentri
description: "Tu app de finanzas personales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.4.0

  # Local storage & security
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.2.1

  # UI / Charts
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # Forms & validation
  reactive_forms: ^17.0.0

  # Utilities
  intl: ^0.20.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Camera / OCR (on-device) - disabled: requires google-services.json + native setup
  # google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # Push notifications - disabled: requires google-services.json
  # firebase_core: ^3.3.0
  # firebase_messaging: ^15.1.2

  # Others
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  flutter_svg: ^2.0.10+1

  # Local push notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  go_router_builder: ^2.7.0
  plugin_platform_interface: ^2.1.8
  path_provider_platform_interface: ^2.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
