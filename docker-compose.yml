services:
  api:
    build:
      context: ./backend
      target: builder   # Uses dev build (with hot reload)
    container_name: finanzas_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: finanzas_latam
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      ENCRYPTION_KEY: dev-32-char-key-change-in-prod!!
      GOOGLE_CLIENT_ID: 642124641220-oh2b998fll013blsj104l8v0gmrpoko8.apps.googleusercontent.com
    command: npm run start:dev
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finanzas_net

  postgres:
    image: postgres:15-alpine
    container_name: finanzas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finanzas_latam
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finanzas_net

  redis:
    image: redis:7-alpine
    container_name: finanzas_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - finanzas_net

volumes:
  postgres_data:
  redis_data:

networks:
  finanzas_net:
    driver: bridge
